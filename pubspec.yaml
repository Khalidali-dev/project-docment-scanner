name: smart_study_assistant
description: "AI-powered Smart Study Assistant for digitizing and organizing study materials."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.3
  google_fonts: ^6.2.1
  animations: ^2.0.11

  # ML Kit
  google_mlkit_text_recognition: ^0.15.0
  google_mlkit_document_scanner: ^0.4.1
  google_mlkit_digital_ink_recognition: ^0.14.1
  google_mlkit_image_labeling: ^0.14.1
  google_mlkit_barcode_scanning: ^0.14.1

  # Camera & Media
  camera: ^0.10.5+5
  image_picker: ^1.0.7
  image: ^4.1.7
  path_provider: ^2.1.1
  permission_handler: ^12.0.1

  # Database
  objectbox: ^5.3.1
  objectbox_flutter_libs: ^5.3.1

  # Storage & Preferences
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^9.0.0

  # State Management
  provider: ^6.1.0
  riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.0.0
  crypto: ^3.0.3
  logger: ^2.2.0
  dio: ^5.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.14.1
  objectbox_generator: ^5.3.1
  riverpod_generator: ^4.0.3

flutter:
  uses-material-design: true

  assets:
    - assets/01.png
    - assets/2.png

  